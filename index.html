<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>e스포츠 윤리 퀴즈</title>
  
  <!-- Firebase SDK (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  
  <style>
    :root {
      --primary: #6C63FF;
      --primary-dark: #574fd6;
      --success: #22c55e;
      --danger: #ef4444;
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #263348;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #6C63FF 0%, #a855f7 100%);
      padding: 24px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: 0.9rem; opacity: .85; margin-top: 4px; }

    /* ── CONTAINER ── */
    .wrap { max-width: 780px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── SETUP SCREEN ── */
    #setup-screen { display: none; }
    #quiz-screen  { display: none; }
    #result-screen{ display: none; }
    #welcome-screen { display: block; }

    /* ── WELCOME OVERLAY ── */
    #welcome-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .welcome-dialog {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .welcome-dialog h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: var(--primary);
    }
    .welcome-dialog p {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .welcome-actions {
      display: flex;
      gap: 12px;
    }
    .welcome-actions .btn {
      flex: 1;
      padding: 12px 20px;
    }

    .setup-card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .setup-card h2 { font-size: 1.15rem; margin-bottom: 18px; color: var(--primary); }

    .form-row { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }

    select, input[type=number] {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--primary); }

    .range-row { display: flex; gap: 10px; }
    .range-row > div { flex: 1; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform .12s, opacity .12s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: #fff; }

    /* ── PROGRESS ── */
    .progress-bar-wrap {
      background: var(--card2);
      border-radius: 8px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6C63FF, #a855f7);
      border-radius: 8px;
      transition: width .3s;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── QUESTION CARD ── */
    .q-card {
      background: var(--card);
      border-radius: 16px;
      padding: 26px;
    }
    .q-number {
      font-size: 0.78rem;
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    /* ── OPTIONS ── */
    .option {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .option:hover:not(.disabled) { border-color: var(--primary); background: #263a56; }
    .option.selected  { border-color: var(--primary); background: #1e1b4b; }
    .option.correct   { border-color: var(--success); background: #14532d44; }
    .option.wrong     { border-color: var(--danger);  background: #7f1d1d44; }
    .option.disabled  { cursor: default; }

    .opt-badge {
      min-width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .9rem;
      background: var(--border);
      color: var(--text);
      flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .option.correct .opt-badge { background: var(--success); color: #fff; }
    .option.wrong   .opt-badge { background: var(--danger);  color: #fff; }
    .option.selected .opt-badge { background: var(--primary); color: #fff; }

    .opt-text { line-height: 1.5; font-size: .95rem; }

    /* ── EXPLANATION ── */
    .explanation {
      margin-top: 18px;
      background: #1e293b;
      border-left: 4px solid var(--primary);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      font-size: .88rem;
      color: #cbd5e1;
      line-height: 1.6;
      display: none;
    }
    .explanation.show { display: block; }
    .explanation strong { color: #a5f3fc; }

    /* ── NAV BUTTONS ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
      gap: 12px;
    }
    .nav-row .btn { padding: 11px 22px; font-size: .92rem; }

    /* ── SCORE BADGE ── */
    .score-live {
      background: var(--card2);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: .82rem;
      color: var(--muted);
    }
    .score-live span { color: var(--success); font-weight: 700; }

    /* ── RESULT SCREEN ── */
    .result-hero {
      text-align: center;
      padding: 36px 20px 28px;
      background: var(--card);
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .result-emoji { font-size: 4rem; margin-bottom: 12px; }
    .result-score { font-size: 3.2rem; font-weight: 900; color: var(--primary); }
    .result-label { color: var(--muted); margin-top: 6px; }
    .result-grade {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      margin-top: 12px;
    }

    .wrong-list { background: var(--card); border-radius: 16px; padding: 22px; }
    .wrong-list h3 { font-size: 1rem; margin-bottom: 16px; color: var(--danger); }
    .wrong-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: .88rem;
    }
    .wrong-item .wq { font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
    .wrong-item .wa { color: var(--success); }
    .wrong-item .wu { color: var(--danger); text-decoration: line-through; opacity: .7; }
    .wrong-item .we { margin-top: 8px; color: #94a3b8; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; }

    .result-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .result-actions .btn { flex: 1; min-width: 140px; }

    /* ── RANKING SIDEBAR ── */
    #ranking-sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: var(--card);
      border-left: 2px solid var(--border);
      overflow-y: auto;
      padding: 20px 16px;
      z-index: 100;
      display: none;
      flex-direction: column;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
    }
    #ranking-sidebar.show { display: flex; }
    #ranking-sidebar h3 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--primary);
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    #ranking-items {
      font-size: 0.85rem;
      flex: 1;
      overflow-y: auto;
    }
    #ranking-items > div {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    #ranking-items > div:last-child {
      border-bottom: none;
    }
    #ranking-items .rank-badge {
      font-weight: 700;
      color: var(--primary);
      min-width: 40px;
      text-align: center;
      flex-shrink: 0;
    }
    #ranking-items .rank-name {
      flex: 1;
      word-break: break-all;
      overflow: hidden;
    }
    #ranking-items .rank-score {
      color: var(--success);
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #334155;
      color: var(--text);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: .9rem;
      transition: transform .3s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── RANKING SIDEBAR ── -->
<div id="ranking-sidebar" class="">
  <h3>🏆 Top 20 순위</h3>
  <div id="ranking-items"></div>
</div>

<header>
  <h1>🎮 e스포츠 윤리 퀴즈</h1>
  <p>54문항으로 e스포츠 윤리를 공부해보세요</p>
</header>

<!-- ── WELCOME SCREEN ── -->
<div id="welcome-overlay">
  <div class="welcome-dialog">
    <h2>🏆 Top 20 순위</h2>
    <div id="welcome-ranking-items" style="margin: 20px 0; text-align: left; max-height: 300px; overflow-y: auto; font-size: 0.85rem;"></div>
    <p>시험을 시작하시겠습니까?</p>
    <div class="welcome-actions">
      <button class="btn btn-outline" onclick="cancelWelcome()" style="flex:1">취소</button>
      <button class="btn btn-primary" onclick="proceedToSetup()" style="flex:1">시작</button>
    </div>
  </div>
</div>

<!-- ── SETUP SCREEN ── -->
<div class="wrap" id="setup-screen">
  <div class="setup-card">
    <h2>⚙️ 시험 설정</h2>

    <div class="form-row">
      <label>학번</label>
      <input type="text" id="student-name" placeholder="학번을 입력하세요" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:1rem;outline:none;" />
    </div>

    <div class="form-row">
      <label>문제 수</label>
      <select id="q-count">
        <option value="10">10문제</option>
        <option value="20">20문제</option>
        <option value="30">30문제</option>
        <option value="54" selected>전체 54문제</option>
        <option value="custom">직접 입력</option>
      </select>
    </div>

    <div class="form-row" id="custom-count-row" style="display:none">
      <label>문제 수 직접 입력 (1~54)</label>
      <input type="number" id="custom-count" min="1" max="54" value="15" />
    </div>

    <div class="form-row" style="display:none">
      <label>문제 범위</label>
      <div class="range-row">
        <div>
          <label>시작 문항</label>
          <input type="number" id="range-start" min="1" max="54" value="1" />
        </div>
        <div>
          <label>끝 문항</label>
          <input type="number" id="range-end" min="1" max="54" value="54" />
        </div>
      </div>
    </div>

    <div class="form-row" style="display:none">
      <label>문제 순서</label>
      <select id="q-order">
        <option value="sequential">순서대로</option>
        <option value="random" selected>무작위 섞기</option>
      </select>
    </div>

    <div class="form-row" style="display:none">
      <label>보기 순서</label>
      <select id="opt-order">
        <option value="fixed">원래 순서 유지</option>
        <option value="random">무작위 섞기</option>
      </select>
    </div>

    <button class="btn btn-primary" onclick="startQuiz()" id="start-btn" disabled style="opacity: 0.5; cursor: not-allowed;">⏳ 데이터 로딩중...</button>
  </div>

  <div class="setup-card" style="font-size:.85rem; color:var(--muted); line-height:1.7;">
    <h2 style="color:var(--muted);">📌 안내</h2>
    <ul style="padding-left:18px; margin-top:8px;">
      <li>각 문항은 5지 선다형입니다.</li>
      <li>답을 선택하면 즉시 정오 피드백과 해설을 볼 수 있습니다.</li>
      <li>시험이 끝나면 점수와 틀린 문제를 확인할 수 있습니다.</li>
    </ul>
  </div>
</div>

<!-- ── QUIZ SCREEN ── -->
<div class="wrap" id="quiz-screen">
  <div class="progress-text">
    <span id="prog-text">문제 1 / 54</span>
    <div class="score-live">맞은 문제: <span id="live-score">0</span></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
  </div>

  <div class="q-card">
    <div class="q-number" id="q-number">문제 1</div>
    <div class="q-text" id="q-text"></div>
    <div id="options-wrap"></div>
    <div class="explanation" id="explanation"></div>
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" id="btn-prev" onclick="prevQ()" style="display:none">← 이전</button>
    <div style="flex:1"></div>
    <button class="btn btn-primary" id="btn-next" onclick="nextQ()" disabled>다음 →</button>
  </div>
</div>

<!-- ── RESULT SCREEN ── -->
<div class="wrap" id="result-screen">
  <div class="result-hero">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score" id="res-score">0 / 0</div>
    <div class="result-label" id="res-label">점수</div>
    <div class="result-grade" id="res-grade"></div>
    <div style="color:var(--muted);font-size:.85rem;margin-top:14px;" id="res-name"></div>
  </div>

  <div class="wrong-list" id="wrong-list-wrap" style="display:none">
    <h3>❌ 틀린 문제 복습</h3>
    <div id="wrong-items"></div>
  </div>

  <div class="result-actions">
    <button class="btn btn-outline" onclick="retryWrong()" id="btn-retry-wrong" style="display:none">틀린 문제만 다시</button>
    <button class="btn btn-primary" onclick="goSetup()">처음으로</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── FIREBASE CONFIG ──
// Firebase 프로젝트 설정
const firebaseConfig = {
  apiKey: "AIzaSyAphJtq1lBfnn1wdeO_cMGbFOTnMLRFMyA",
  authDomain: "esports-quiz-70ec9.firebaseapp.com",
  databaseURL: "https://esports-quiz-70ec9-default-rtdb.firebaseio.com",
  projectId: "esports-quiz-70ec9",
  storageBucket: "esports-quiz-70ec9.appspot.com",
  messagingSenderId: "939758278402",
  appId: "1:939758278402:web:1790d3b5555129cc7dd41b"
};

// Firebase 초기화
let db = null;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  console.log('✅ Firebase 초기화 완료');
  // 페이지 로드 시 순위 표시 및 welcome 창 표시
  showWelcomeScreen();
} catch (err) {
  console.error('Firebase 초기화 실패:', err);
}

// ── DATA ──
let ALL_QUESTIONS = [];

// ── STATE ──
let questions = [];
let current = 0;
let score = 0;
let answered = []; // {index, selected, correct, correctLetter}
let wrongQ = [];

// ── LOAD JSON ──
fetch('questions.json')
  .then(r => r.json())
  .then(data => {
    ALL_QUESTIONS = data;
    console.log(`✅ ${ALL_QUESTIONS.length}개 문제 로드 완료`);
    // 시작 버튼 활성화
    const startBtn = document.getElementById('start-btn');
    startBtn.disabled = false;
    startBtn.textContent = '▶ 시험 시작';
    startBtn.style.opacity = '1';
    startBtn.style.cursor = 'pointer';
  })
  .catch((err) => {
    console.error('questions.json 로드 실패:', err);
    showToast('⚠️ 문제 데이터를 불러오지 못했습니다. 페이지를 새로고침하세요.');
  });

// ── SETUP ──
document.getElementById('q-count').addEventListener('change', function() {
  document.getElementById('custom-count-row').style.display =
    this.value === 'custom' ? 'block' : 'none';
});

function startQuiz() {
  console.log('startQuiz 함수 실행됨');
  console.log('ALL_QUESTIONS 로드 상태:', ALL_QUESTIONS.length);
  
  // 학번 입력 확인
  const studentName = document.getElementById('student-name').value.trim();
  if (!studentName) {
    showToast('⚠️ 학번을 입력하세요.');
    return;
  }

  // 문제 데이터 로드 확인
  if (!ALL_QUESTIONS.length) { 
    console.error('문제 데이터가 로드되지 않음');
    showToast('⚠️ 문제 데이터를 불러오는 중입니다. 잠시 후 다시 시도하세요.'); 
    return; 
  }

  const start = parseInt(document.getElementById('range-start').value) || 1;
  const end   = parseInt(document.getElementById('range-end').value)   || 54;
  let pool = ALL_QUESTIONS.filter(q => q.number >= start && q.number <= end);

  console.log(`문제 범위: ${start}~${end}, 필터된 문제: ${pool.length}개`);

  // 항상 문제 순서를 무작위로
  pool = shuffle([...pool]);

  const cntSel = document.getElementById('q-count').value;
  let cnt = cntSel === 'custom'
    ? parseInt(document.getElementById('custom-count').value) || 10
    : parseInt(cntSel);
  cnt = Math.min(cnt, pool.length);
  questions = pool.slice(0, cnt);

  console.log(`선택된 문제 수: ${questions.length}개`);

  current = 0; score = 0; answered = []; wrongQ = [];

  document.getElementById('welcome-overlay').style.display = 'none';
  document.getElementById('ranking-sidebar').classList.remove('show');
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ();
  console.log('시험 시작됨');
}

// ── RENDER QUESTION ──
function renderQ() {
  const q = questions[current];
  const total = questions.length;
  const pct = (current / total) * 100;

  document.getElementById('prog-text').textContent = `문제 ${current + 1} / ${total}`;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('live-score').textContent = score;
  document.getElementById('q-number').textContent = `문제 ${current + 1} (문항 ${q.number})`;
  document.getElementById('q-text').textContent = q.question;

  // Options - 항상 무작위로 섞기
  let letters = Object.keys(q.options);
  letters = shuffle([...letters]);

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  letters.forEach((letter, idx) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = letter;
    // 알파벳 대신 1~5로 표시
    const badgeNum = idx + 1;
    div.innerHTML = `
      <div class="opt-badge">${badgeNum}</div>
      <div class="opt-text">${q.options[letter]}</div>
    `;
    div.onclick = () => selectOption(letter);
    wrap.appendChild(div);
  });

  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').textContent = current < questions.length - 1 ? '다음 →' : '결과 보기';
  document.getElementById('btn-prev').style.display = current > 0 ? 'inline-block' : 'none';
}

// ── SELECT OPTION ──
function selectOption(selected) {
  // If already answered, ignore
  if (answered[current] !== undefined) return;

  const q = questions[current];
  const correctLetter = q.answer;
  const isCorrect = selected === correctLetter;

  if (!isCorrect) {
    // 틀리면 점수 저장 후 결과 화면으로
    answered[current] = { selected, correctLetter, isCorrect: false };
    
    // 틀린 문제 기록
    wrongQ.push({ q, selected, correctLetter });
    
    showToast('❌ 오답입니다!');
    setTimeout(() => {
      showResult(true); // true = 오답으로 끝남
    }, 800);
    return;
  }

  // 정답인 경우
  score++;
  answered[current] = { selected, correctLetter, isCorrect };

  // Style options
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('disabled');
    const l = el.dataset.letter;
    if (l === correctLetter) el.classList.add('correct');
    else if (l === selected && !isCorrect) el.classList.add('wrong');
  });

  // Show explanation
  const expDiv = document.getElementById('explanation');
  const exps = q.explanations || {};

  // Build explanation HTML
  let html = '';
  if (isCorrect) {
    html += `<strong>✅ 정답입니다!</strong><br><br>`;
  } else {
    html += `<strong>❌ 오답입니다. 정답은 ${correctLetter}번입니다.</strong><br><br>`;
  }

  // Show correct answer explanation
  const correctExp = exps[correctLetter] || '';
  const cleanExp = correctExp.replace('[정답] ', '').replace(/^[A-E]\..+?((?=[가-힣])|$)/, '').trim();
  // Just show the explanation part after the option text
  const optText = q.options[correctLetter] || '';
  let expText = cleanExp;
  if (expText.startsWith(optText)) expText = expText.slice(optText.length).trim();
  if (expText) html += `<strong>해설:</strong> ${expText}`;

  expDiv.innerHTML = html;
  expDiv.classList.add('show');

  document.getElementById('live-score').textContent = score;
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (current < questions.length - 1) {
    current++;
    renderQ();
    window.scrollTo(0, 0);
  } else {
    showResult(); // async 함수 호출
  }
}

function prevQ() {
  if (current > 0) {
    current--;
    renderQ();
    // Re-apply answered state
    const ans = answered[current];
    if (ans) {
      const q = questions[current];
      document.querySelectorAll('.option').forEach(el => {
        el.classList.add('disabled');
        const l = el.dataset.letter;
        if (l === ans.correctLetter) el.classList.add('correct');
        else if (l === ans.selected && !ans.isCorrect) el.classList.add('wrong');
      });
      document.getElementById('btn-next').disabled = false;
    }
    window.scrollTo(0, 0);
  }
}

// ── RESULT ──
async function showResult(isIncomplete = false) {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const name = document.getElementById('student-name').value.trim();

  document.getElementById('res-score').textContent = `${score}문항`;
  
  if (isIncomplete) {
    // 오답으로 중단된 경우
    document.getElementById('res-label').textContent = `시험 중단 (${score}/${total})`;
    document.getElementById('res-emoji').textContent = '❌';
    const gradeEl = document.getElementById('res-grade');
    gradeEl.textContent = '오답으로 인해 종료됨';
    gradeEl.style.background = '#ef444422';
    gradeEl.style.color = '#ef4444';
  } else {
    // 정상 완료
    document.getElementById('res-label').textContent = `맞춘 문항 (${score}/${total})`;
    
    let emoji, grade, color;
    if (pct >= 90) { emoji = '🏆'; grade = 'S등급 — 탁월함!'; color = '#f59e0b'; }
    else if (pct >= 80) { emoji = '🥇'; grade = 'A등급 — 우수!'; color = '#22c55e'; }
    else if (pct >= 70) { emoji = '🥈'; grade = 'B등급 — 양호'; color = '#3b82f6'; }
    else if (pct >= 60) { emoji = '🥉'; grade = 'C등급 — 보통'; color = '#a855f7'; }
    else { emoji = '📚'; grade = 'D등급 — 더 공부해요'; color = '#ef4444'; }

    document.getElementById('res-emoji').textContent = emoji;
    const gradeEl = document.getElementById('res-grade');
    gradeEl.textContent = grade;
    gradeEl.style.background = color + '22';
    gradeEl.style.color = color;
  }

  document.getElementById('res-name').textContent = name ? `학번: ${name}` : '';

  // Wrong list
  if (wrongQ.length > 0) {
    document.getElementById('wrong-list-wrap').style.display = 'block';
    
    // 오답으로 중단된 경우 "틀린 문제만 다시" 버튼 숨기기
    if (isIncomplete) {
      document.getElementById('btn-retry-wrong').style.display = 'none';
    } else {
      document.getElementById('btn-retry-wrong').style.display = 'inline-block';
    }
    
    const container = document.getElementById('wrong-items');
    container.innerHTML = '';
    wrongQ.forEach(({ q, selected, correctLetter }) => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      const exps = q.explanations || {};
      const correctExp = (exps[correctLetter] || '').replace('[정답] ', '');
      const optText = q.options[correctLetter] || '';
      let expText = correctExp;
      if (expText.startsWith(optText)) expText = expText.slice(optText.length).trim();

      div.innerHTML = `
        <div class="wq">문항 ${q.number}. ${q.question}</div>
        <div class="wu">내 답: ${selected}. ${q.options[selected] || ''}</div>
        <div class="wa">정답: ${correctLetter}. ${q.options[correctLetter] || ''}</div>
        ${expText ? `<div class="we">💡 ${expText}</div>` : ''}
      `;
      container.appendChild(div);
    });
  } else {
    document.getElementById('wrong-list-wrap').style.display = 'none';
    if (!isIncomplete) {
      document.getElementById('btn-retry-wrong').style.display = 'none';
    }
  }

  // Firebase에 점수 저장
  await saveScoreToFirebase();
  
  // 순위 로드 및 표시
  await loadLeaderboard();
  document.getElementById('ranking-sidebar').classList.remove('show');

  window.scrollTo(0, 0);
}

// ── FIREBASE 점수 저장 ──
async function saveScoreToFirebase() {
  if (!db) return; // Firebase가 설정되지 않으면 무시

  const name = document.getElementById('student-name').value.trim();
  if (!name) {
    showToast('학번을 입력하면 순위에 기록됩니다.');
    return;
  }

  const total = questions.length;
  const timestamp = new Date().getTime();
  
  try {
    // 학번으로 점수 기록
    await db.ref(`scores/${name}`).push({
      score: score,
      total: total,
      percentage: Math.round((score / total) * 100),
      timestamp: timestamp,
      date: new Date().toLocaleString('ko-KR')
    });
  } catch (err) {
    console.log('Firebase 저장 실패:', err);
  }
}

// ── FIREBASE 순위 조회 ──
async function loadLeaderboard() {
  if (!db) {
    document.getElementById('ranking-sidebar').classList.remove('show');
    return;
  }

  try {
    const snapshot = await db.ref('scores').get();
    if (!snapshot.exists()) {
      document.getElementById('ranking-sidebar').classList.remove('show');
      return;
    }

    const scoreByStudent = {}; // 학번별 최고 점수

    snapshot.forEach(nameSnap => {
      const studentName = nameSnap.key;
      let maxScore = 0;
      let maxTotal = 0;
      let maxPercentage = 0;

      nameSnap.forEach(recordSnap => {
        const data = recordSnap.val();
        // 각 학번별로 최고 점수만 유지
        if (data.score > maxScore) {
          maxScore = data.score;
          maxTotal = data.total;
          maxPercentage = data.percentage;
        }
      });

      scoreByStudent[studentName] = {
        name: studentName,
        score: maxScore,
        total: maxTotal,
        percentage: maxPercentage
      };
    });

    // 점수 배열로 변환
    const allScores = Object.values(scoreByStudent);

    // 점수 기준으로 내림차순 정렬
    allScores.sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      // 같은 점수면 정답 비율이 높은 순서
      return b.percentage - a.percentage;
    });

    // 상위 20명까지 표시
    const top20 = allScores.slice(0, 20);
    
    if (top20.length === 0) {
      document.getElementById('ranking-sidebar').classList.remove('show');
      return;
    }

    // ranking-sidebar 업데이트
    document.getElementById('ranking-sidebar').classList.add('show');
    const rankingHtml = top20.map((item, idx) => `
      <div>
        <span class="rank-badge">
          ${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : (idx + 1) + '위'}
        </span>
        <span class="rank-name">${item.name}</span>
        <span class="rank-score">${item.score}/${item.total}</span>
      </div>
    `).join('');

    document.getElementById('ranking-items').innerHTML = rankingHtml;

    // welcome 창의 랭킹도 업데이트
    const welcomeRankingHtml = top20.map((item, idx) => `
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border);">
        <span style="font-weight: 700; color: var(--primary); min-width: 30px;">
          ${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : (idx + 1) + '위'}
        </span>
        <span style="flex: 1;">${item.name}</span>
        <span style="color: var(--success); font-weight: 700;">${item.score}/${item.total}</span>
      </div>
    `).join('');

    document.getElementById('welcome-ranking-items').innerHTML = welcomeRankingHtml;
  } catch (err) {
    console.log('순위 조회 실패:', err);
    document.getElementById('ranking-sidebar').classList.remove('show');
  }
}

// ── WELCOME SCREEN ──
async function showWelcomeScreen() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('welcome-overlay').style.display = 'flex';
  document.getElementById('ranking-sidebar').classList.add('show');
  await loadLeaderboard();
}

function proceedToSetup() {
  document.getElementById('welcome-overlay').style.display = 'none';
  document.getElementById('ranking-sidebar').classList.remove('show');
  document.getElementById('setup-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

function cancelWelcome() {
  showToast('☺️ 시험 시작 안함');
}

function retryWrong() {
  questions = wrongQ.map(w => w.q);
  current = 0;
  score = 0;
  answered = [];
  wrongQ = [];
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ();
}

function goSetup() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('welcome-overlay').style.display = 'flex';
  document.getElementById('student-name').value = ''; // 학번 입력 초기화
  loadLeaderboard();
  window.scrollTo(0, 0);
}

// ── UTILS ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
